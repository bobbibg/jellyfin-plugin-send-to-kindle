name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Jellyfin.Plugin.SendToKindle.sln

      - name: Build
        run: |
          dotnet build Jellyfin.Plugin.SendToKindle.sln \
            --configuration Release \
            --no-restore \
            -p:Version=${{ steps.version.outputs.version }} \
            -p:AssemblyVersion=${{ steps.version.outputs.version }}.0 \
            -p:FileVersion=${{ steps.version.outputs.version }}.0

      - name: Package plugin zip
        run: |
          OUT=Jellyfin.Plugin.SendToKindle/bin/Release/net8.0
          mkdir -p dist
          cd "$OUT"
          # Bundle the plugin .dll plus the dependencies the host doesn't already provide.
          zip -j "$GITHUB_WORKSPACE/dist/send-to-kindle_${{ steps.version.outputs.version }}.zip" \
            Jellyfin.Plugin.SendToKindle.dll \
            MailKit.dll \
            MimeKit.dll \
            BouncyCastle.Cryptography.dll
          cd "$GITHUB_WORKSPACE"
          ls -la dist/

      - name: Compute checksum
        id: checksum
        run: |
          ZIP="dist/send-to-kindle_${{ steps.version.outputs.version }}.zip"
          MD5=$(md5sum "$ZIP" | awk '{print $1}')
          echo "md5=$MD5" >> "$GITHUB_OUTPUT"
          echo "MD5: $MD5"

      - name: Update manifest.json on main
        env:
          VERSION: ${{ steps.version.outputs.version }}
          MD5: ${{ steps.checksum.outputs.md5 }}
        run: |
          git checkout main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          python3 - <<'PY'
          import json, os, datetime
          version = os.environ["VERSION"]
          md5 = os.environ["MD5"]
          repo = os.environ["GITHUB_REPOSITORY"]
          download_url = f"https://github.com/{repo}/releases/download/v{version}/send-to-kindle_{version}.zip"
          timestamp = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          with open("manifest.json", "r") as f:
              data = json.load(f)

          entry = {
              "version": f"{version}.0",
              "changelog": f"Release {version}",
              "targetAbi": "10.10.0.0",
              "sourceUrl": download_url,
              "checksum": md5,
              "timestamp": timestamp
          }

          versions = data[0].setdefault("versions", [])
          versions = [v for v in versions if v.get("version") != entry["version"]]
          versions.insert(0, entry)
          data[0]["versions"] = versions

          with open("manifest.json", "w") as f:
              json.dump(data, f, indent=2)
              f.write("\n")
          PY

          git add manifest.json
          git commit -m "Update manifest for v${VERSION}" || echo "nothing to commit"
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/send-to-kindle_${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
